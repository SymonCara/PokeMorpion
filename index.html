<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMorpion - Menu Principal</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #ff3e3e;
            --accent2: #3e86ff;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --card-bg: #16161a;
            --border: #2d2d35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .menu-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff3e3e, #ff8a3e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            background: #23232a;
            border: 1px solid var(--border);
            color: white;
            padding: 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn:hover {
            background: #2d2d35;
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .menu-btn.primary {
            background: linear-gradient(135deg, var(--accent), #ff6b3e);
            border: none;
        }

        .menu-btn.primary:hover {
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
        }

        .btn-icon {
            font-size: 24px;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .btn-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div class="logo">POKEMORPION</div>
        <div class="subtitle">L'Ultime Défi Pokédex</div>

        <div class="menu-options">
            <a href="pokedoku.html" class="menu-btn primary">
                <div class="btn-text">
                    <span>POKEDOKU</span>
                    <span class="btn-desc">Remplissez la grille 3x3</span>
                </div>
                <span class="btn-icon">🎮</span>
            </a>

            <a href="starter.html" class="menu-btn">
                <div class="btn-text">
                    <span>STARTER AVEUGLE</span>
                    <span class="btn-desc">Générez 3 Pokémon aléatoires</span>
                </div>
                <span class="btn-icon">🎲</span>
            </a>

            <div class="menu-btn" style="opacity: 0.5; cursor: not-allowed;">
                <div class="btn-text">
                    <span>COLLECTION</span>
                    <span class="btn-desc">Bientôt disponible...</span>
                </div>
                <span class="btn-icon">📁</span>
            </div>
        </div>
    </div>
</body>
</html>
