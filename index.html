<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéGrid — Le Défi des Dresseurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #080c14;
    --bg-panel: #0d1422;
    --bg-card: #121929;
    --bg-hover: #1a2438;
    --border: #1e2d45;
    --border-glow: #2a4a7f;
    --accent: #e63946;
    --accent2: #4cc9f0;
    --accent3: #f4d03f;
    --text-primary: #e8edf5;
    --text-secondary: #7a8fa8;
    --text-dim: #3d5068;
    --success: #2ecc71;
    --pokered: #cc2929;
    --scan-line: rgba(76, 201, 240, 0.03);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scan-line) 2px, var(--scan-line) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: linear-gradient(rgba(30, 45, 69, 0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(30, 45, 69, 0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    position: relative;
  }

  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-ball {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(180deg, var(--pokered) 50%, #fff 50%);
    position: relative; box-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
  }
  .logo-ball::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 3px; background: #1a1a1a; }
  .logo-ball::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 2px solid #1a1a1a; box-shadow: 0 0 8px rgba(76, 201, 240, 0.6); }

  .logo-text h1 { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
  .logo-text h1 span { color: var(--accent2); }
  .logo-text p { font-size: 10px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; font-family: 'Share Tech Mono', monospace; }

  .header-stats { display: flex; gap: 24px; align-items: center; }
  .stat-badge { text-align: center; }
  .stat-badge .val { font-family: 'Share Tech Mono', monospace; font-size: 22px; color: var(--accent2); display: block; line-height: 1; }
  .stat-badge .lbl { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
  .divider-v { width: 1px; height: 36px; background: var(--border); }

  .game-message {
    width: 100%; max-width: 860px; background: rgba(230, 57, 70, 0.15); border: 1px solid var(--accent);
    color: #ffb3b8; padding: 12px; border-radius: 8px; text-align: center; font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 16px; margin-bottom: 16px; animation: fadeIn 0.3s ease;
  }
  .game-message.hidden { display: none; }

  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 80px 0; }
  .loader-ring { width: 64px; height: 64px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent2); animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #game-container { width: 100%; max-width: 860px; display: none; flex-direction: column; gap: 20px; animation: fadeIn 0.5s ease; }

  .grid-wrapper {
    display: grid; grid-template-columns: 140px repeat(3, 1fr); grid-template-rows: 100px repeat(3, 120px);
    gap: 6px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 8px;
  }

  .corner-cell { display: flex; align-items: center; justify-content: center; }
  .corner-logo { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(180deg, var(--pokered) 50%, #fff 50%); opacity: 0.4; position: relative; }
  .corner-logo::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:10px; height:10px; background:#fff; border:2px solid #1a1a1a; border-radius:50%; }

  .header-cell {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px; text-align: center;
  }
  .header-row-cell { flex-direction: column; align-items: flex-start; padding-left: 15px; }

  .header-label { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 1px; color: var(--text-primary); text-transform: uppercase; }
  .header-sub { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--accent2); letter-spacing: 1px; }

  .game-cell {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative;
  }
  .game-cell:hover:not(.locked) { border-color: var(--border-glow); transform: scale(1.02); background: var(--bg-hover); }
  .game-cell.locked { cursor: default; }
  .game-cell.pending { border-color: var(--accent2); }
  .game-cell.correct { border-color: var(--success); background: rgba(46, 204, 113, 0.05); }
  .game-cell.error { border-color: var(--accent); background: rgba(230, 57, 70, 0.1); animation: shake 0.4s; }

  @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 30%, 70% { transform: translate3d(-4px, 0, 0); } 50% { transform: translate3d(4px, 0, 0); } }

  .cell-plus { font-size: 24px; color: var(--text-dim); }

  .pokemon-entry { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 4px; width: 100%; height: 100%; animation: popIn 0.3s; }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pokemon-entry img { width: 58px; height: 58px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .pokemon-entry .poke-name { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; color: var(--text-secondary); text-align: center; line-height: 1.1; }
  .poke-id { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); }

  .game-footer { width: 100%; max-width: 860px; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; }
  .btn { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; transition: all 0.2s; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-validate { background: linear-gradient(135deg, var(--success), #27ae60); color: #fff; box-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
  .btn-validate:disabled { background: var(--bg-card); color: var(--text-dim); cursor: not-allowed; opacity: 0.6; }
  .btn-validate.ready { animation: pulse-btn 2s infinite; }
  @keyframes pulse-btn { 0%, 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); } }

  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(8, 12, 20, 0.85); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; }
  #modal-overlay.active { display: flex; }
  .modal { background: var(--bg-panel); border: 1px solid var(--border-glow); border-radius: 16px; width: 100%; max-width: 600px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 20px; border-bottom: 1px solid var(--border); }
  .modal-target { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; }
  .target-chip { background: var(--bg-card); border: 1px solid var(--border-glow); border-radius: 6px; padding: 6px 12px; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; display: flex; gap: 8px; }
  .search-box { position: relative; }
  .search-box input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px 12px 42px; color: var(--text-primary); outline: none; border: 1px solid var(--border); }
  .modal-close { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-secondary); background: none; border: none; font-size: 20px; }

  .results-grid { overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 1; }
  .result-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.2s; }
  .result-card:hover { border-color: var(--accent2); background: var(--bg-hover); transform: translateY(-2px); }
  .result-card.already-used { opacity: 0.3; cursor: not-allowed; }
  .result-card img { width: 64px; height: 64px; object-fit: contain; }
  .result-name { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; margin-top: 5px; text-align: center; }

  #result-screen { display: none; position: fixed; inset: 0; background: rgba(8, 12, 20, 0.95); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; gap: 20px; }
  #result-screen.active { display: flex; }
  .result-title { font-family: 'Rajdhani', sans-serif; font-size: 48px; font-weight: 800; letter-spacing: 4px; }
  .result-title.win { color: var(--success); }
  .result-score { font-family: 'Share Tech Mono', monospace; font-size: 24px; }
  .result-score span { color: var(--accent2); font-weight: bold; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-ball"></div>
      <div class="logo-text">
        <h1>Poké<span>Grid</span></h1>
        <p>Le Défi des Dresseurs</p>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-badge"><span class="val" id="stat-round">1/2</span><span class="lbl">Phase</span></div>
      <div class="divider-v"></div>
      <div class="stat-badge"><span class="val" id="stat-found">0/9</span><span class="lbl">Rempli</span></div>
    </div>
  </header>

  <div id="game-message" class="game-message hidden"></div>

  <div id="loading">
    <div class="loader-ring"></div>
    <div class="loading-text">Chargement du Pokédex…</div>
  </div>

  <div id="game-container">
    <div class="grid-wrapper" id="grid"></div>
    <div class="game-footer">
      <button class="btn btn-ghost" onclick="newGame()">↻ Nouvelle Grille</button>
      <button id="btn-validate" class="btn btn-validate" onclick="validateGrid()" disabled>✅ Valider</button>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-target" id="modal-target"></div>
      <div class="search-box">
        <span style="position:absolute; left:15px; top:12px">🔍</span>
        <input type="text" id="search-input" placeholder="Nom du Pokémon..." oninput="filterPokemon(this.value)">
      </div>
    </div>
    <div class="results-grid" id="results-grid"></div>
  </div>
</div>

<div id="result-screen">
  <div class="result-title" id="result-title"></div>
  <div class="result-score" id="result-score"></div>
  <button class="btn btn-validate" onclick="newGame()">↻ Rejouer</button>
</div>

<script>
// --- DONNÉES SPÉCIALES ---
const LEGENDARIES_IDS = [144,145,146,150,151,243,244,245,249,250,251,377,378,379,380,381,382,383,384,385,386,480,481,482,483,484,485,486,487,488,489,490,491,492,493,494,638,639,640,641,642,643,644,645,646,647,648,649,716,717,718,719,720,721,772,773,785,786,787,788,789,790,791,792,793,794,795,796,797,798,799,800,801,802,803,804,805,806,807,808,809,888,889,890,891,892,893,894,895,896,897,898,905,1001,1002,1003,1004,1007,1008,1014,1015,1016,1017,1024,1025];
const STARTERS_IDS = [1,4,7,152,155,158,252,255,258,387,390,393,495,498,501,650,653,658,722,725,728,810,813,816,906,909,912];
const MEGAS_IDS = [3,6,9,15,18,65,80,94,115,127,130,142,150,181,208,212,214,229,248,254,257,260,282,302,303,306,308,310,319,323,334,354,359,362,373,376,380,381,384,428,445,448,460,475,531,719];
const GYM_LEADER_POKES = [25,54,66,74,95,102,111,120,121,130,143,1,4,7,133,6,9,3,150,68,94,112,131,149,208,212,248,306,376,445,448]; 
const BLACK_SHINIES_IDS = [6,38,94,197,248,282,359,384,445,448,461,612,635,658,823,887,1007,1008];

let allPokemon = [];
let colHeaders = [];
let rowHeaders = [];
let gridSelections = Array(9).fill(null);
let gridStatuses = Array(9).fill('empty');
let currentRound = 1;
let currentCell = null;

// --- CHARGEMENT ---
async function loadPokemon() {
  try {
    updateLoadingText('Récupération du Pokédex complet...');
    const urlsToTry = ['./pokedex.json', 'https://cdn.jsdelivr.net/gh/fanzeyi/pokemon.json@master/pokedex.json'];
    let data = null;
    for (const url of urlsToTry) {
      try { const res = await fetch(url); if (res.ok) { data = await res.json(); break; } } catch (e) {}
    }
    if (!data) throw new Error();

    const TYPE_MAP = {'Fire':'Feu','Water':'Eau','Grass':'Plante','Electric':'Électrik','Psychic':'Psy','Normal':'Normal','Fighting':'Combat','Poison':'Poison','Ground':'Sol','Flying':'Vol','Bug':'Insecte','Rock':'Roche','Ghost':'Spectre','Dragon':'Dragon','Dark':'Ténèbres','Steel':'Acier','Fairy':'Fée','Ice':'Glace'};
    
    allPokemon = data.map(p => {
      const types = (p.type || []).map(t => TYPE_MAP[t]).filter(Boolean);
      const id = p.id;
      return {
        id, name: p.name.french, types,
        generation: id <= 151 ? 1 : id <= 251 ? 2 : id <= 386 ? 3 : id <= 493 ? 4 : id <= 649 ? 5 : id <= 721 ? 6 : id <= 809 ? 7 : id <= 905 ? 8 : 9,
        isLegendary: LEGENDARIES_IDS.includes(id),
        isStarter: STARTERS_IDS.some(sid => id >= sid && id <= sid + 2),
        isMega: MEGAS_IDS.includes(id),
        isGym: GYM_LEADER_POKES.includes(id),
        isBlackShiny: BLACK_SHINIES_IDS.includes(id),
        sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
      };
    }).sort((a,b) => a.id - b.id);
    return true;
  } catch (e) {
    updateLoadingText('Erreur ! Vérifie ton fichier pokedex.json');
    return false;
  }
}

function updateLoadingText(t) { document.querySelector('.loading-text').textContent = t; }

// --- LOGIQUE DE CRITÈRES ---
function pokemonMatchesCriteria(p, c) {
  if (!p || !c) return false;
  if (c.type === 'type') return p.types.includes(c.value);
  if (c.type === 'gen') return p.generation === parseInt(c.value);
  if (c.type === 'legend') return p.isLegendary;
  if (c.type === 'dual') return p.types.length === 2;
  if (c.type === 'mono') return p.types.length === 1;
  if (c.type === 'mega') return p.isMega;
  if (c.type === 'gym') return p.isGym;
  if (c.type === 'black') return p.isBlackShiny;
  if (c.type === 'starter') return p.isStarter;
  return false;
}

function areCriteriaCompatible(c1, c2) {
  if (c1.group === c2.group && c1.value !== c2.value) return false;
  const types = [c1.type, c2.type];
  if (types.includes('legend') && types.includes('starter')) return false;
  if (types.includes('mono') && types.includes('dual')) return false;
  return true;
}

function generateValidGrid() {
  const types = [...new Set(allPokemon.flatMap(p => p.types))];
  const gens = [1, 2, 3, 4, 5, 6, 7, 8, 9];
  const specials = [
    { type: 'legend', label: 'Légendaire', sub: 'Statut', group: 'rarity' },
    { type: 'dual', label: 'Double Type', sub: 'Attribut', group: 'type_count' },
    { type: 'mono', label: 'Un seul type', sub: 'Attribut', group: 'type_count' },
    { type: 'mega', label: 'Méga', sub: 'Évolution', group: 'special' },
    { type: 'gym', label: 'Champion', sub: 'Arène', group: 'special' },
    { type: 'black', label: 'Shiny Noir', sub: 'Physique', group: 'special' },
    { type: 'starter', label: 'Starter', sub: 'Début', group: 'rarity' }
  ];

  const pool = [
    ...types.map(t => ({ type: 'type', value: t, label: t, sub: 'Type', group: 'type' })),
    ...gens.map(g => ({ type: 'gen', value: g, label: `Gen ${g}`, sub: 'Génération', group: 'gen' })),
    ...specials
  ];

  for (let i = 0; i < 2000; i++) {
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    const cols = shuffled.slice(0, 3);
    const rows = shuffled.slice(3, 6);
    
    let ok = true;
    for(let r=0; r<3; r++) {
      for(let c=0; c<3; c++) {
        if (!areCriteriaCompatible(rows[r], cols[c]) || !allPokemon.some(p => pokemonMatchesCriteria(p, rows[r]) && pokemonMatchesCriteria(p, cols[c]))) {
          ok = false; break;
        }
      }
      if (!ok) break;
    }
    if (ok) { colHeaders = cols; rowHeaders = rows; return true; }
  }
  return false;
}

// --- RENDU ET JEU ---
function renderGrid() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  const corner = document.createElement('div'); corner.className = 'corner-cell'; corner.innerHTML = '<div class="corner-logo"></div>'; g.appendChild(corner);

  colHeaders.forEach(h => {
    const c = document.createElement('div'); c.className = 'header-cell';
    c.innerHTML = `<div class="header-label">${h.label}</div><div class="header-sub">${h.sub}</div>`;
    g.appendChild(c);
  });

  for (let r = 0; r < 3; r++) {
    const rh = rowHeaders[r];
    const rhc = document.createElement('div'); rhc.className = 'header-cell header-row-cell';
    rhc.innerHTML = `<div class="header-label">${rh.label}</div><div class="header-sub">${rh.sub}</div>`;
    g.appendChild(rhc);

    for (let c = 0; c < 3; c++) {
      const idx = r * 3 + c;
      const cell = document.createElement('div'); cell.className = `game-cell ${gridStatuses[idx]}`;
      if (gridSelections[idx]) {
        const p = gridSelections[idx];
        cell.innerHTML = `<div class="pokemon-entry"><img src="${p.sprite}"><div class="poke-name">${p.name}</div><div class="poke-id">N°${p.id}</div></div>`;
      } else { cell.innerHTML = '<span class="cell-plus">+</span>'; }
      if (gridStatuses[idx] !== 'correct') cell.onclick = () => openModal(idx);
      g.appendChild(cell);
    }
  }
}

function updateStats() {
  const filled = gridSelections.filter(Boolean).length;
  document.getElementById('stat-found').textContent = `${filled}/9`;
  document.getElementById('stat-round').textContent = `${currentRound}/2`;
  document.getElementById('btn-validate').disabled = filled === 0;
  if(filled > 0) document.getElementById('btn-validate').classList.add('ready');
  else document.getElementById('btn-validate').classList.remove('ready');
}

function validateGrid() {
  let score = 0, errors = 0, blanks = 0;
  for (let i = 0; i < 9; i++) {
    if (gridStatuses[i] === 'correct') { score++; continue; }
    if (gridSelections[i]) {
      const isValid = pokemonMatchesCriteria(gridSelections[i], rowHeaders[Math.floor(i/3)]) && pokemonMatchesCriteria(gridSelections[i], colHeaders[i%3]);
      if (isValid) { gridStatuses[i] = 'correct'; score++; }
      else { gridStatuses[i] = 'error'; errors++; }
    } else { blanks++; }
  }
  renderGrid(); updateStats();
  if (errors === 0 && blanks === 0) showResult(true, score);
  else if (currentRound === 1) { 
    currentRound = 2; 
    const m = document.getElementById('game-message'); m.classList.remove('hidden'); 
    m.textContent = "Phase 2 : corrige les cases rouges pour atteindre la perfection !"; 
  }
  else showResult(false, score);
}

function openModal(idx) {
  currentCell = idx;
  const target = document.getElementById('modal-target');
  target.innerHTML = `<div class="target-chip">${rowHeaders[Math.floor(idx/3)].label}</div> <span>×</span> <div class="target-chip">${colHeaders[idx%3].label}</div>`;
  document.getElementById('search-input').value = '';
  showResults('');
  document.getElementById('modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function filterPokemon(q) { showResults(q); }

function showResults(q) {
  const container = document.getElementById('results-grid');
  const query = q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const filtered = allPokemon.filter(p => p.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(query));
  
  container.innerHTML = '';
  filtered.forEach(p => {
    const card = document.createElement('div'); card.className = 'result-card';
    if (gridSelections.some(s => s && s.id === p.id && gridSelections.indexOf(s) !== currentCell)) card.classList.add('already-used');
    card.innerHTML = `<img src="${p.sprite}"><div class="result-name">${p.name}</div><div class="poke-id">N°${p.id}</div>`;
    card.onclick = () => { if(!card.classList.contains('already-used')) selectPokemon(p); };
    container.appendChild(card);
  });
}

function selectPokemon(p) {
  gridSelections[currentCell] = p; gridStatuses[currentCell] = 'pending';
  closeModal(); renderGrid(); updateStats();
}

function showResult(win, score) {
  const s = document.getElementById('result-screen');
  document.getElementById('result-title').textContent = score === 9 ? 'PERFECTION !' : 'TERMINÉ !';
  document.getElementById('result-score').innerHTML = `Note Finale : <span>${score}/9</span>`;
  s.classList.add('active');
}

function newGame() {
  gridSelections.fill(null); gridStatuses.fill('empty'); currentRound = 1;
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('game-message').classList.add('hidden');
  if (generateValidGrid()) { renderGrid(); updateStats(); }
}

async function init() {
  const ok = await loadPokemon();
  if (ok) { document.getElementById('loading').style.display = 'none'; document.getElementById('game-container').style.display = 'flex'; newGame(); }
}
init();
</script>
</body>
</html>
