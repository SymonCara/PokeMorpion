<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMorpion - Menu Principal</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #ff3e3e;
            --accent2: #3e86ff;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --card-bg: #16161a;
            --border: #2d2d35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .menu-container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff3e3e, #ff8a3e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            background: #23232a;
            border: 1px solid var(--border);
            color: white;
            padding: 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn:hover {
            background: #2d2d35;
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .menu-btn.primary {
            background: linear-gradient(135deg, var(--accent), #ff6b3e);
            border: none;
        }

        .menu-btn.primary:hover {
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.4);
        }

        .btn-icon {
            font-size: 24px;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .btn-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <div id="auth-section" style="margin-bottom: 20px; text-align: right;">
            <div id="user-info" style="display:none; color:var(--accent2); font-size:14px; font-weight:bold;">
                <span id="display-name"></span> (<span id="user-score">0</span> pts)
                <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:12px; margin-left:10px;">[Déconnexion]</button>
            </div>
            <button id="login-trigger" onclick="showAuthModal()" style="background:var(--accent); border:none; color:white; padding:5px 15px; border-radius:20px; font-size:12px; cursor:pointer;">SE CONNECTER</button>
        </div>

        <div class="logo">POKEMORPION</div>
        <div class="subtitle">L'Ultime Défi Pokédex</div>

        <div class="menu-options">
            <a href="pokedoku.html" class="menu-btn primary">
                <div class="btn-text">
                    <span>POKEDOKU</span>
                    <span class="btn-desc">Remplissez la grille 3x3</span>
                </div>
                <span class="btn-icon">🎮</span>
            </a>

            <a href="starter.html" class="menu-btn">
                <div class="btn-text">
                    <span>STARTER AVEUGLE</span>
                    <span class="btn-desc">Générez 3 Pokémon aléatoires</span>
                </div>
                <span class="btn-icon">🎲</span>
            </a>

            <div class="menu-btn" onclick="showLeaderboard()">
                <div class="btn-text">
                    <span>CLASSEMENT</span>
                    <span class="btn-desc">Voir les meilleurs joueurs</span>
                </div>
                <span class="btn-icon">🏆</span>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:1000;">
        <div class="menu-container" style="max-width:350px; padding:30px;">
            <h2 id="auth-title" style="margin-bottom:20px;">CONNEXION</h2>
            <input type="text" id="auth-pseudo" placeholder="Pseudo" class="auth-input">
            <input type="password" id="auth-pass" placeholder="Mot de passe" class="auth-input">
            <div id="auth-error" style="color:var(--accent); font-size:12px; margin-bottom:10px; display:none;"></div>
            <button class="menu-btn primary" style="width:100%; justify-content:center; padding:12px; font-size:14px;" onclick="handleAuth()">VALIDER</button>
            <p style="margin-top:15px; font-size:12px; color:var(--text-dim);">
                <span id="auth-switch-text">Pas de compte ?</span>
                <a href="javascript:void(0)" onclick="toggleAuthMode()" id="auth-switch-btn" style="color:var(--accent2); text-decoration:none;">S'inscrire</a>
            </p>
            <button onclick="closeAuthModal()" style="margin-top:10px; background:none; border:none; color:var(--text-dim); cursor:pointer;">Fermer</button>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:1000;">
        <div class="menu-container" style="max-width:400px; padding:30px;">
            <h2 style="margin-bottom:20px; color:var(--accent2);">CLASSEMENT MONDIAL</h2>
            <div id="leaderboard-list" style="max-height:300px; overflow-y:auto; text-align:left; margin-bottom:20px;">
                <!-- List items here -->
            </div>
            <button class="menu-btn" style="width:100%; justify-content:center;" onclick="closeLeaderboard()">RETOUR</button>
        </div>
    </div>

    <style>
        .auth-input { width:100%; background:#1a1a20; border:1px solid var(--border); color:white; padding:12px; border-radius:10px; margin-bottom:10px; outline:none; }
        .auth-input:focus { border-color:var(--accent2); }
        .leaderboard-item { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid var(--border); font-size:14px; }
        .leaderboard-item:last-child { border:none; }
        .rank { color:var(--accent); font-weight:bold; margin-right:10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKi9ExC0q1FtMF-vYaqklmntYldgWIfDc",
            authDomain: "pokemorpion.firebaseapp.com",
            projectId: "pokemorpion",
            storageBucket: "pokemorpion.firebasestorage.app",
            messagingSenderId: "702634428380",
            appId: "1:702634428380:web:3cf2e1ca03d5d2cdc43119"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = JSON.parse(localStorage.getItem('poke_user')) || null;
        let isSignup = false;

        window.showAuthModal = () => document.getElementById('auth-modal').style.display = 'flex';
        window.closeAuthModal = () => document.getElementById('auth-modal').style.display = 'none';
        window.toggleAuthMode = () => {
            isSignup = !isSignup;
            document.getElementById('auth-title').innerText = isSignup ? "INSCRIPTION" : "CONNEXION";
            document.getElementById('auth-switch-text').innerText = isSignup ? "Déjà un compte ?" : "Pas de compte ?";
            document.getElementById('auth-switch-btn').innerText = isSignup ? "Se connecter" : "S'inscrire";
        };

        window.handleAuth = async () => {
            const pseudo = document.getElementById('auth-pseudo').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            const err = document.getElementById('auth-error');
            err.style.display = 'none';

            if (!pseudo || !pass) return;

            const userRef = doc(db, "users", pseudo);
            const snap = await getDoc(userRef);

            if (isSignup) {
                if (snap.exists()) {
                    err.innerText = "Ce pseudo est déjà pris !";
                    err.style.display = 'block';
                } else {
                    const newUser = { pseudo, pass, score: 0 };
                    await setDoc(userRef, newUser);
                    loginUser(newUser);
                }
            } else {
                if (snap.exists() && snap.data().pass === pass) {
                    loginUser(snap.data());
                } else {
                    err.innerText = "Pseudo ou mot de passe incorrect !";
                    err.style.display = 'block';
                }
            }
        };

        function loginUser(user) {
            currentUser = user;
            localStorage.setItem('poke_user', JSON.stringify(user));
            updateUserUI();
            closeAuthModal();
        }

        window.logout = () => {
            currentUser = null;
            localStorage.removeItem('poke_user');
            updateUserUI();
        };

        function updateUserUI() {
            if (currentUser) {
                document.getElementById('login-trigger').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('display-name').innerText = currentUser.pseudo;
                document.getElementById('user-score').innerText = currentUser.score;
            } else {
                document.getElementById('login-trigger').style.display = 'block';
                document.getElementById('user-info').style.display = 'none';
            }
        }

        window.showLeaderboard = async () => {
            document.getElementById('leaderboard-modal').style.display = 'flex';
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '<p style="text-align:center;">Chargement...</p>';

            const q = query(collection(db, "users"), orderBy("score", "desc"), limit(10));
            const snap = await getDocs(q);
            list.innerHTML = '';
            let i = 1;
            snap.forEach(doc => {
                const u = doc.data();
                const item = document.createElement('div');
                item.className = 'leaderboard-item';
                item.innerHTML = `<div><span class="rank">#${i++}</span> ${u.pseudo}</div><div style="font-weight:bold;">${u.score} pts</div>`;
                list.appendChild(item);
            });
        };

        window.closeLeaderboard = () => document.getElementById('leaderboard-modal').style.display = 'none';

        updateUserUI();
    </script>
</body>
</html>
