<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokéGrid — Multijoueur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>

<style>
  :root {
    --bg-deep: #080c14;
    --bg-panel: #0d1422;
    --bg-card: #121929;
    --bg-hover: #1a2438;
    --border: #1e2d45;
    --border-glow: #2a4a7f;
    --accent: #e63946;
    --accent2: #4cc9f0;
    --accent3: #f4d03f;
    --text-primary: #e8edf5;
    --text-secondary: #7a8fa8;
    --text-dim: #3d5068;
    --success: #2ecc71;
    --pokered: #cc2929;
    --scan-line: rgba(76, 201, 240, 0.03);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scan-line) 2px, var(--scan-line) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  header {
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 28px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-ball {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(180deg, var(--pokered) 50%, #fff 50%);
    position: relative; box-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
  }
  .logo-ball::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 2px solid #1a1a1a; }

  .logo-text h1 { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
  .logo-text h1 span { color: var(--accent2); }

  /* ===== MENU ===== */
  #menu-container {
    width: 100%;
    max-width: 500px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
  }

  .menu-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .menu-btn:hover { border-color: var(--accent2); background: var(--bg-hover); transform: translateY(-3px); }
  .menu-btn h3 { font-family: 'Rajdhani', sans-serif; font-size: 20px; margin-bottom: 5px; color: var(--accent2); }
  .menu-btn p { font-size: 13px; color: var(--text-secondary); }

  .input-code {
    background: var(--bg-deep);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 8px;
    color: white;
    font-family: 'Share Tech Mono', monospace;
    text-align: center;
    font-size: 24px;
    letter-spacing: 5px;
    width: 100%;
    margin-top: 10px;
    text-transform: uppercase;
  }

  /* ===== GAME STYLES ===== */
  #game-container { width: 100%; max-width: 1000px; display: none; flex-direction: column; gap: 20px; }
  .game-layout { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

  .grid-section { flex: 1; min-width: 350px; max-width: 450px; }
  .player-label { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--accent2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }

  .grid-wrapper {
    display: grid; grid-template-columns: 80px repeat(3, 1fr); grid-template-rows: 60px repeat(3, 100px);
    gap: 4px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; padding: 6px;
  }

  .header-cell { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px; text-align: center; font-size: 11px; }
  .header-label { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--text-primary); text-transform: uppercase; font-size: 11px; }
  .header-sub { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--accent2); }

  .game-cell { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .game-cell.locked { cursor: default; }
  .game-cell.correct { border-color: var(--success); background: rgba(46, 204, 113, 0.05); }
  .game-cell.error { border-color: var(--accent); background: rgba(230, 57, 70, 0.1); }
  .game-cell.pending { border-color: var(--accent2); }

  .pokemon-entry { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 2px; }
  .pokemon-entry img { width: 50px; height: 50px; object-fit: contain; }
  .pokemon-entry .poke-name { font-family: 'Rajdhani', sans-serif; font-size: 9px; font-weight: 600; text-align: center; }

  .btn { font-family: 'Rajdhani', sans-serif; font-weight: 600; padding: 12px 24px; border-radius: 6px; border: none; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
  .btn-primary { background: var(--accent2); color: #000; }
  .btn-validate { background: var(--success); color: white; width: 100%; }
  .btn-validate:disabled { opacity: 0.5; cursor: not-allowed; }

  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
  #modal-overlay.active { display: flex; }
  .modal { background: var(--bg-panel); border: 1px solid var(--border-glow); padding: 20px; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; }
  .results-grid { overflow-y: auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-top: 15px; }
  .result-card { background: var(--bg-card); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); cursor: pointer; }
  .result-card:hover { border-color: var(--accent2); }
  .result-card img { width: 50px; }

  #loading { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 50px; }
  
  .versus-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      background: var(--bg-panel);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--accent2);
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-ball"></div>
      <div class="logo-text">
        <h1>Poké<span>Grid</span></h1>
        <p>Défi Multijoueur</p>
      </div>
    </div>
    <div id="room-info" class="header-stats" style="display:none">
       <div class="stat-badge"><span class="val" id="display-room-code">----</span><span class="lbl">Code Salle</span></div>
       <div class="divider-v"></div>
       <div class="stat-badge"><span class="val" id="stat-score">0 - 0</span><span class="lbl">Score</span></div>
    </div>
  </header>

  <!-- MENU D'ACCUEIL -->
  <div id="menu-container">
    <div class="menu-btn" onclick="startSolo()">
      <h3>Mode Solo</h3>
      <p>Entraînez-vous seul sur une grille aléatoire.</p>
    </div>
    <div style="margin: 10px 0; color: var(--text-dim);">--- OU ---</div>
    <div class="menu-btn" onclick="createRoom()">
      <h3>Créer une Salle</h3>
      <p>Générez un code et défiez un ami.</p>
    </div>
    <div class="menu-btn">
      <h3>Rejoindre</h3>
      <input type="text" id="join-input" class="input-code" placeholder="CODE" maxlength="6">
      <button class="btn btn-primary" style="margin-top: 15px; width: 100%;" onclick="joinRoom()">REJOINDRE</button>
    </div>
  </div>

  <div id="loading">
    <div class="loader-ring"></div>
    <div class="loading-text">Chargement...</div>
  </div>

  <!-- ZONE DE JEU -->
  <div id="game-container">
    <div id="waiting-msg" class="game-message hidden">En attente de l'adversaire...</div>
    
    <div class="game-layout">
        <!-- Grille Joueur -->
        <div class="grid-section">
            <div class="player-label" id="my-label">Ma Grille</div>
            <div id="grid-me" class="grid-wrapper"></div>
            <button id="btn-validate" class="btn btn-validate" style="margin-top:10px" onclick="handleValidate()">✅ Valider Phase 1</button>
        </div>

        <!-- Grille Adversaire (Visible après validation mutuelle) -->
        <div class="grid-section" id="opponent-section" style="display:none">
            <div class="player-label">Adversaire</div>
            <div id="grid-opponent" class="grid-wrapper"></div>
        </div>
    </div>
  </div>
</div>

<!-- MODALE RECHERCHE -->
<div id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <button onclick="closeModal()" style="float:right; background:none; border:none; color:white; cursor:pointer;">✕</button>
      <input type="text" id="search-input" class="input-code" style="font-size: 16px; letter-spacing: 1px;" placeholder="Chercher un Pokémon..." oninput="filterPokemon(this.value)">
    </div>
    <div class="results-grid" id="results-grid"></div>
  </div>
</div>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = JSON.parse(__firebase_config);
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const appId = typeof __app_id !== 'undefined' ? __app_id : 'pokegrid-multi';

// --- DATA ---
let allPokemon = [];
let currentGame = {
    mode: 'solo',
    roomCode: null,
    isCreator: false,
    role: 'p1', // p1 ou p2
    phase: 1,
    p1Data: { grid: Array(9).fill(null), validated: false, score: 0 },
    p2Data: { grid: Array(9).fill(null), validated: false, score: 0 },
    headers: { rows: [], cols: [] }
};

let currentCell = null;
let userId = null;

// --- INITIALISATION ---
async function initApp() {
    await auth.signInAnonymously();
    userId = auth.currentUser.uid;
    const ok = await loadPokemonData();
    if (ok) {
        document.getElementById('loading').style.display = 'none';
    }
}

async function loadPokemonData() {
    try {
        const res = await fetch('./pokedex.json');
        const data = await res.json();
        const TYPE_MAP = {'Fire':'Feu','Water':'Eau','Grass':'Plante','Electric':'Électrik','Psychic':'Psy','Normal':'Normal','Fighting':'Combat','Poison':'Poison','Ground':'Sol','Flying':'Vol','Bug':'Insecte','Rock':'Roche','Ghost':'Spectre','Dragon':'Dragon','Dark':'Ténèbres','Steel':'Acier','Fairy':'Fée','Ice':'Glace'};
        allPokemon = data.map(p => ({
            id: p.id,
            name: p.name.french,
            types: (p.type || []).map(t => TYPE_MAP[t]).filter(Boolean),
            generation: p.id <= 151 ? 1 : p.id <= 251 ? 2 : p.id <= 386 ? 3 : p.id <= 493 ? 4 : p.id <= 649 ? 5 : p.id <= 721 ? 6 : p.id <= 809 ? 7 : p.id <= 905 ? 8 : 9,
            sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.id}.png`
        }));
        return true;
    } catch (e) { return false; }
}

// --- LOGIQUE MULTIJOUEUR ---
async function createRoom() {
    const code = Math.random().toString(36).substring(2, 8).toUpperCase();
    currentGame.mode = 'multi';
    currentGame.roomCode = code;
    currentGame.isCreator = true;
    currentGame.role = 'p1';
    
    // Générer la grille
    generateGridHeaders();

    const roomRef = db.doc(`/artifacts/${appId}/public/data/rooms/${code}`);
    await roomRef.set({
        code,
        headers: currentGame.headers,
        p1: { uid: userId, grid: Array(9).fill(null), validated: false, finalScore: 0 },
        p2: null,
        status: 'waiting',
        currentPhase: 1
    });

    listenToRoom(code);
    showGameUI();
}

async function joinRoom() {
    const code = document.getElementById('join-input').value.toUpperCase();
    if (!code) return;

    const roomRef = db.doc(`/artifacts/${appId}/public/data/rooms/${code}`);
    const snap = await roomRef.get();

    if (!snap.exists()) {
        alert("Salle introuvable !");
        return;
    }

    currentGame.mode = 'multi';
    currentGame.roomCode = code;
    currentGame.isCreator = false;
    currentGame.role = 'p2';

    await roomRef.update({
        p2: { uid: userId, grid: Array(9).fill(null), validated: false, finalScore: 0 },
        status: 'playing'
    });

    listenToRoom(code);
    showGameUI();
}

function listenToRoom(code) {
    db.doc(`/artifacts/${appId}/public/data/rooms/${code}`).onSnapshot((doc) => {
        const data = doc.data();
        if (!data) return;

        currentGame.headers = data.headers;
        currentGame.p1Data = data.p1;
        currentGame.p2Data = data.p2;
        currentGame.status = data.status;
        currentGame.phase = data.currentPhase;

        document.getElementById('display-room-code').innerText = code;
        renderGrids();
        updateMultiStatus();
    }, (err) => console.error(err));
}

// --- LOGIQUE DE JEU ---
function generateGridHeaders() {
    const types = ['Feu', 'Eau', 'Plante', 'Électrik', 'Normal', 'Vol', 'Sol', 'Psy', 'Combat', 'Poison'];
    const gens = [1, 2, 3, 4, 5, 6, 7, 8, 9];
    
    // Simplifié pour la démo
    const shuffledTypes = types.sort(() => Math.random() - 0.5);
    const shuffledGens = gens.sort(() => Math.random() - 0.5);

    currentGame.headers = {
        cols: [
            { type: 'type', label: shuffledTypes[0], value: shuffledTypes[0], sub: 'TYPE' },
            { type: 'type', label: shuffledTypes[1], value: shuffledTypes[1], sub: 'TYPE' },
            { type: 'gen', label: 'Gen ' + shuffledGens[0], value: shuffledGens[0], sub: 'GÉNÉRATION' }
        ],
        rows: [
            { type: 'type', label: shuffledTypes[2], value: shuffledTypes[2], sub: 'TYPE' },
            { type: 'type', label: shuffledTypes[3], value: shuffledTypes[3], sub: 'TYPE' },
            { type: 'gen', label: 'Gen ' + shuffledGens[1], value: shuffledGens[1], sub: 'GÉNÉRATION' }
        ]
    };
}

function showGameUI() {
    document.getElementById('menu-container').style.display = 'none';
    document.getElementById('game-container').style.display = 'flex';
    document.getElementById('room-info').style.display = 'flex';
}

function renderGrids() {
    renderGrid('grid-me', currentGame.role === 'p1' ? currentGame.p1Data : currentGame.p2Data, true);
    
    // Afficher l'adversaire seulement si les deux ont validé la phase en cours
    if (currentGame.p1Data && currentGame.p2Data && currentGame.p1Data.validated && currentGame.p2Data.validated) {
        document.getElementById('opponent-section').style.display = 'block';
        renderGrid('grid-opponent', currentGame.role === 'p1' ? currentGame.p2Data : currentGame.p1Data, false);
    } else {
        document.getElementById('opponent-section').style.display = 'none';
    }
}

function renderGrid(containerId, playerData, isInteractive) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    // Corner
    const corner = document.createElement('div');
    corner.className = 'header-cell';
    corner.innerHTML = '🏁';
    container.appendChild(corner);

    // Cols
    currentGame.headers.cols.forEach(h => {
        const c = document.createElement('div');
        c.className = 'header-cell';
        c.innerHTML = `<div class="header-label">${h.label}</div><div class="header-sub">${h.sub}</div>`;
        container.appendChild(c);
    });

    for (let r = 0; r < 3; r++) {
        const rowH = currentGame.headers.rows[r];
        const rhc = document.createElement('div');
        rhc.className = 'header-cell';
        rhc.innerHTML = `<div class="header-label">${rowH.label}</div><div class="header-sub">${rowH.sub}</div>`;
        container.appendChild(rhc);

        for (let c = 0; c < 3; c++) {
            const idx = r * 3 + c;
            const cell = document.createElement('div');
            cell.className = 'game-cell';
            
            const pId = playerData.grid[idx];
            const p = pId ? allPokemon.find(x => x.id === pId) : null;

            if (p) {
                // Vérifier si c'est correct (seulement si validé)
                let statusClass = '';
                if (playerData.validated) {
                    const isValid = checkMatch(p, rowH, currentGame.headers.cols[c]);
                    statusClass = isValid ? 'correct' : 'error';
                } else {
                    statusClass = 'pending';
                }
                cell.classList.add(statusClass);
                cell.innerHTML = `<div class="pokemon-entry"><img src="${p.sprite}"><div class="poke-name">${p.name}</div></div>`;
            } else {
                cell.innerHTML = '<span class="cell-plus">+</span>';
            }

            if (isInteractive && !playerData.validated) {
                cell.onclick = () => openModal(idx);
            } else {
                cell.classList.add('locked');
            }

            container.appendChild(cell);
        }
    }
}

function checkMatch(p, crit1, crit2) {
    const match = (p, c) => c.type === 'type' ? p.types.includes(c.value) : p.generation === c.value;
    return match(p, crit1) && match(p, crit2);
}

function updateMultiStatus() {
    const myData = currentGame.role === 'p1' ? currentGame.p1Data : currentGame.p2Data;
    const oppData = currentGame.role === 'p1' ? currentGame.p2Data : currentGame.p1Data;
    const btn = document.getElementById('btn-validate');
    const wait = document.getElementById('waiting-msg');

    if (myData.validated) {
        btn.disabled = true;
        btn.innerText = "Validation envoyée";
        if (oppData && !oppData.validated) {
            wait.classList.remove('hidden');
            wait.innerText = "En attente de l'adversaire...";
        } else {
            wait.classList.add('hidden');
            if (currentGame.phase === 1) {
                btn.disabled = false;
                btn.innerText = "Passer à la Phase 2";
                btn.onclick = () => startPhase2();
            } else {
                btn.style.display = 'none';
                calculateWinner();
            }
        }
    } else {
        btn.disabled = myData.grid.filter(Boolean).length === 0;
        btn.innerText = `Valider Phase ${currentGame.phase}`;
        wait.classList.add('hidden');
    }

    // Score display
    if (oppData) {
        document.getElementById('stat-score').innerText = `${currentGame.p1Data.finalScore} - ${currentGame.p2Data.finalScore}`;
    }
}

async function handleValidate() {
    const role = currentGame.role;
    const myData = role === 'p1' ? currentGame.p1Data : currentGame.p2Data;
    myData.validated = true;

    await db.doc(`/artifacts/${appId}/public/data/rooms/${currentGame.roomCode}`).update({
        [role]: myData
    });
}

async function startPhase2() {
    // Reset validation pour les deux
    const roomRef = db.doc(`/artifacts/${appId}/public/data/rooms/${currentGame.roomCode}`);
    await roomRef.update({
        'p1.validated': false,
        'p2.validated': false,
        'currentPhase': 2
    });
}

function calculateWinner() {
    const calc = (data) => {
        let s = 0;
        data.grid.forEach((pId, i) => {
            const p = allPokemon.find(x => x.id === pId);
            if (p && checkMatch(p, currentGame.headers.rows[Math.floor(i/3)], currentGame.headers.cols[i%3])) s++;
        });
        return s;
    };
    
    const s1 = calc(currentGame.p1Data);
    const s2 = calc(currentGame.p2Data);

    const title = s1 === s2 ? "ÉGALITÉ !" : (currentGame.role === 'p1' ? (s1 > s2 ? "GAGNÉ !" : "PERDU") : (s2 > s1 ? "GAGNÉ !" : "PERDU"));
    
    document.getElementById('result-title').innerText = title;
    document.getElementById('result-score').innerHTML = `Score Final : <span>${currentGame.role === 'p1' ? s1 : s2}/9</span>`;
    document.getElementById('result-screen').classList.add('active');
}

// --- UI HELPERS ---
function openModal(idx) {
    currentCell = idx;
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById('search-input').value = '';
    showResults('');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function showResults(query) {
    const container = document.getElementById('results-grid');
    const q = query.toLowerCase();
    const filtered = allPokemon.filter(p => p.name.toLowerCase().includes(q)).slice(0, 50);
    
    container.innerHTML = '';
    filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `<img src="${p.sprite}"><div class="poke-name">${p.name}</div>`;
        card.onclick = () => selectPokemon(p);
        container.appendChild(card);
    });
}

async function selectPokemon(p) {
    const role = currentGame.role;
    const myData = role === 'p1' ? currentGame.p1Data : currentGame.p2Data;
    myData.grid[currentCell] = p.id;

    if (currentGame.mode === 'multi') {
        await db.doc(`/artifacts/${appId}/public/data/rooms/${currentGame.roomCode}`).update({
            [`${role}.grid`]: myData.grid
        });
    } else {
        renderGrids();
        updateMultiStatus();
    }
    closeModal();
}

function startSolo() {
    currentGame.mode = 'solo';
    currentGame.role = 'p1';
    generateGridHeaders();
    currentGame.p1Data = { grid: Array(9).fill(null), validated: false, finalScore: 0 };
    showGameUI();
    renderGrids();
    updateMultiStatus();
}

initApp();
</script>
</body>
</html>
