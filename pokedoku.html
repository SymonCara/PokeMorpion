<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeMorpion - Pokedoku</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --bg-card: #16161a;
            --accent: #ff3e3e;
            --accent2: #3e86ff;
            --accent3: #ffcd19;
            --text: #ffffff;
            --text-secondary: #a0a0a0;
            --text-dim: #606060;
            --border: #2d2d35;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .btn-back {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            transition: color 0.3s;
        }
        .btn-back:hover { color: white; }

        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 5px solid var(--border);
            border-top: 5px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Game UI */
        .game-container {
            flex: 1;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .header-cell {
            background: #1a1a20;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .header-label { font-weight: bold; color: white; font-size: 14px; margin-bottom: 4px; }

        .game-cell {
            aspect-ratio: 1;
            background: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .game-cell:hover { border-color: var(--accent); background: #1e1e24; transform: scale(1.02); }
        .game-cell.locked { cursor: default; border-style: solid; border-color: var(--border); }
        .game-cell.locked:hover { transform: none; background: var(--bg-card); }
        .game-cell.correct { border-color: #4CAF50; background: rgba(76, 175, 80, 0.1); border-style: solid; box-shadow: inset 0 0 10px rgba(76, 175, 80, 0.2); }
        .game-cell.error { border-color: var(--accent); background: rgba(255, 62, 62, 0.1); border-style: solid; }

        .grids-wrapper {
            display: flex;
            gap: 40px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .grid-container { flex: 1; min-width: 300px; max-width: 450px; }

        .pokemon-entry { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .pokemon-entry img { width: 70%; image-rendering: pixelated; }
        .poke-name { font-size: 11px; font-weight: bold; text-align: center; }

        /* Modal Search */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 1000;
            align-items: flex-start;
            justify-content: center;
            padding-top: 50px;
        }
        #modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card);
            width: 95%;
            max-width: 500px;
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .search-input {
            width: 100%;
            background: #23232a;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
        }
        .results-grid { height: 400px; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .result-card {
            background: #23232a;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
        }
        .result-card:hover { background: #2d2d35; }
        .result-card img { width: 60px; }
        .result-name { font-size: 11px; margin-top: 5px; }

        .btn-validate {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
        }
        .btn-validate:disabled { opacity: 0.5; cursor: not-allowed; }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: var(--bg-card);
            border: 1px solid var(--accent);
            border-radius: 10px;
            z-index: 10000;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-ring"></div>
        <p style="margin-top: 20px; color: var(--text-secondary);">Récupération du Pokédex National...</p>
    </div>

    <!-- Setup Menu -->
    <div id="setup-menu" style="position:fixed; inset:0; background:var(--bg); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="modal" style="display:block; padding:30px; text-align:center;">
            <h1 style="color:var(--accent); margin-bottom:20px;">CONFIGURATION POKEDOKU</h1>
            
            <div style="margin-bottom:30px;">
                <p style="color:var(--text-secondary); margin-bottom:10px;">MODE DE JEU</p>
                <div style="display:flex; gap:10px; justify-content:center;">
                    <button id="mode-solo" class="btn-validate" style="margin:0; width:auto; padding:10px 20px; background:var(--accent2);" onclick="selectMode('solo')">SOLO (2 PHASES)</button>
                    <button id="mode-multi" class="btn-validate" style="margin:0; width:auto; padding:10px 20px; background:var(--bg-card); border:1px solid var(--border);" onclick="selectMode('multi')">MULTIJOUEUR</button>
                </div>
            </div>

            <div id="multi-options" style="display:none; margin-bottom:30px; animation: slideUp 0.3s ease;">
                <div id="multi-main-choice">
                    <div style="display:flex; gap:10px; justify-content:center; margin-bottom:20px;">
                        <button class="btn-validate" style="margin:0; width:auto; padding:10px 20px; background:var(--accent);" onclick="showMultiFlow('create')">CRÉER UNE PARTIE</button>
                        <button class="btn-validate" style="margin:0; width:auto; padding:10px 20px; background:var(--accent2);" onclick="showMultiFlow('join')">REJOINDRE UNE PARTIE</button>
                    </div>
                </div>

                <div id="multi-create-flow" style="display:none;">
                    <p style="color:var(--text-secondary); margin-bottom:10px;">NOMBRE DE PHASES</p>
                    <div style="display:flex; gap:5px; justify-content:center; margin-bottom:15px;">
                        <button class="phase-btn active" onclick="setPhases(1)">1</button>
                        <button class="phase-btn" onclick="setPhases(2)">2</button>
                        <button class="phase-btn" onclick="setPhases(3)">3</button>
                        <button class="phase-btn" onclick="setPhases(5)">5</button>
                        <button class="phase-btn" onclick="setPhases(999)">∞</button>
                    </div>
                    <input type="text" id="create-room-id" placeholder="Nom de la salle à créer..." class="search-input" style="text-align:center; margin-bottom:10px;">
                    <button class="btn-validate" style="background:var(--accent);" onclick="startMulti('create')">CRÉER ET LANCER</button>
                </div>

                <div id="multi-join-flow" style="display:none;">
                    <input type="text" id="join-room-id" placeholder="Code de la salle..." class="search-input" style="text-align:center; margin-bottom:10px;">
                    <button class="btn-validate" style="background:var(--accent2);" onclick="startMulti('join')">REJOINDRE LA SALLE</button>
                </div>
            </div>

            <button id="start-game-solo" class="btn-validate" onclick="startGameSolo()">LANCER LA PARTIE SOLO</button>
            <br>
            <a href="index.html" style="color:var(--text-dim); text-decoration:none; font-size:12px; display:inline-block; margin-top:20px;">RETOUR AU MENU</a>
        </div>
    </div>

    <style>
        .phase-btn { background:var(--bg-card); border:1px solid var(--border); color:white; padding:10px; border-radius:8px; cursor:pointer; width:45px; }
        .phase-btn.active { background:var(--accent); border-color:var(--accent); }
    </style>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <a href="pokedoku.html" class="btn-back"><span>↺</span></a>
            <div id="room-status" style="font-size: 10px; color: var(--text-dim);">SOLO</div>
        </div>
        <div style="text-align: center;">
            <h1 style="font-size: 18px;">POKEDOKU</h1>
            <p id="phase-counter" style="font-size: 10px; color: var(--accent);">PHASE 1</p>
        </div>
        <div id="waiting-status" style="font-size: 10px; color: var(--accent3); visibility:hidden; font-weight:bold;">EN ATTENTE DE L'ADVERSAIRE...</div>
    </header>

    <main class="game-container" id="main-game" style="display:none; max-width:1200px;">
        <div class="grids-wrapper">
            <!-- Mon Plateau -->
            <div id="my-zone" class="grid-container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 id="my-label" style="font-size:14px; color:var(--accent2);">VOTRE GRILLE</h3>
                    <span id="my-score" style="font-size:12px; font-weight:bold;">0/9</span>
                </div>
                <div id="grid-me" class="grid-layout"></div>
            </div>

            <!-- Plateau Adversaire -->
            <div id="opp-zone" class="grid-container" style="display:none; opacity:0.8; pointer-events:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3 style="font-size:14px; color:var(--accent);">ADVERSAIRE</h3>
                    <span id="opp-score" style="font-size:12px; font-weight:bold;">0/9</span>
                </div>
                <div id="grid-opp" class="grid-layout"></div>
            </div>
        </div>

        <div id="game-controls">
            <button id="btn-validate" class="btn-validate" onclick="handleValidate()">VALIDER LA GRILLE</button>
            <button id="btn-next" class="btn-validate" style="background:var(--accent2); display:none;" onclick="handleNextPhase()">PASSER À LA PHASE SUIVANTE</button>
            <button id="btn-restart" class="btn-validate" style="background: var(--bg-card); border: 1px solid var(--border); margin-top: 10px; display:none;" onclick="location.reload()">REJOUER</button>
        </div>
    </main>

    <div id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div id="modal-target-title" style="margin-bottom: 10px; font-weight: bold; color: var(--accent2);"></div>
                <input type="text" id="search-input" class="search-input" placeholder="Chercher un Pokémon..." oninput="filterPokemon(this.value)">
            </div>
            <div id="results-grid" class="results-grid"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script type="module">
        // Import Firebase components if needed for disputes
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKi9ExC0q1FtMF-vYaqklmntYldgWIfDc",
            authDomain: "pokemorpion.firebaseapp.com",
            projectId: "pokemorpion",
            storageBucket: "pokemorpion.firebasestorage.app",
            messagingSenderId: "702634428380",
            appId: "1:702634428380:web:3cf2e1ca03d5d2cdc43119"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        import { onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let allPokemon = [];
        let gridHeaders = { rows: [], cols: [] };
        let myGrid = Array(9).fill(null);
        let oppGrid = Array(9).fill(null);
        let gridAtPhaseStart = Array(9).fill(null);
        let currentCell = null;
        let isValidated = false;
        let roomName = null;
        let myPlayerId = 'p1';
        let gameMode = 'solo';
        let maxPhases = 2;
        let currentPhase = 1;
        let isWaitingForNext = false;

        window.selectMode = (m) => {
            gameMode = m;
            document.getElementById('mode-solo').style.background = m === 'solo' ? 'var(--accent2)' : 'var(--bg-card)';
            document.getElementById('mode-multi').style.background = m === 'multi' ? 'var(--accent2)' : 'var(--bg-card)';
            document.getElementById('multi-options').style.display = m === 'multi' ? 'block' : 'none';
            document.getElementById('start-game-solo').style.display = m === 'solo' ? 'block' : 'none';
            if (m === 'solo') maxPhases = 2;
        };

        window.showMultiFlow = (type) => {
            document.getElementById('multi-main-choice').style.display = 'none';
            document.getElementById('multi-create-flow').style.display = type === 'create' ? 'block' : 'none';
            document.getElementById('multi-join-flow').style.display = type === 'join' ? 'block' : 'none';
        };

        window.setPhases = (n) => {
            maxPhases = n;
            document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
            if (event) event.target.classList.add('active');
        };

        window.startMulti = async (type) => {
            if (allPokemon.length === 0) return alert("Le Pokédex est encore en cours de chargement...");
            const room = document.getElementById(type === 'create' ? 'create-room-id' : 'join-room-id').value.trim();
            if (!room) return alert("Entrez un nom de salle !");
            roomName = room;
            await joinRoom();
            document.getElementById('setup-menu').style.display = 'none';
            document.getElementById('main-game').style.display = 'block';
            updateUI();
        };

        window.startGameSolo = () => {
            if (allPokemon.length === 0) return alert("Le Pokédex est encore en cours de chargement...");
            try {
                generateHeaders();
                gridAtPhaseStart = Array(9).fill(null);
                renderGrid('me');
                document.getElementById('setup-menu').style.display = 'none';
                document.getElementById('main-game').style.display = 'block';
                updateUI();
            } catch (e) {
                console.error("Solo start error:", e);
                alert("Erreur lors de la génération de la grille. Réessayez.");
            }
        };

        async function init() {
            let data = null;
            try {
                const res = await fetch('https://cdn.jsdelivr.net/gh/fanzeyi/pokemon.json@master/pokedex.json');
                if (res.ok) data = await res.json();
            } catch (e) {}

            try {
                const rawData = data || offlineBackup.map(p => ({id:p[0], name:{french:p[1]}, type:p[2]}));
                allPokemon = rawData.map(p => {
                    const id = p.id;
                    const types = (p.type || []).map(t => TYPE_MAP[t] || t).filter(Boolean);
                    return {
                        id, name: p.name.french || p.name.english, types,
                        generation: id <= 151 ? 1 : id <= 251 ? 2 : id <= 386 ? 3 : id <= 493 ? 4 : id <= 649 ? 5 : id <= 721 ? 6 : id <= 809 ? 7 : id <= 905 ? 8 : 9,
                        isLegendary: LEGENDARIES_IDS.includes(id),
                        isMythical: MYTHICAL_IDS.includes(id),
                        isStarter: STARTERS_IDS.some(sid => id >= sid && id <= sid + 2),
                        isMega: MEGAS_IDS.includes(id),
                        isBlackShiny: BLACK_SHINIES.includes(id),
                        stage: STAGE3_IDS.includes(id) ? 3 : STAGE2_IDS.includes(id) ? 2 : 1,
                        sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`
                    };
                });

                [...GEN8_DATA, ...GEN9_DATA, ...ZA_MEGAS_DATA, ...OFFICIAL_MEGAS_DATA].forEach(p => {
                    if (!allPokemon.find(x => x.id === p[0])) {
                        allPokemon.push({
                            id: p[0], name: p[1], types: p[2],
                            generation: p[0] < 810 ? (p[0] > 721 ? 7 : 6) : (p[0] < 906 ? 8 : 9),
                            isLegendary: LEGENDARIES_IDS.includes(p[0]),
                            isMythical: MYTHICAL_IDS.includes(p[0]),
                            isStarter: STARTERS_IDS.some(sid => p[0] >= sid && p[0] <= sid + 2),
                            isMega: MEGAS_IDS.includes(p[0]) || p[0] > 10000,
                            isBlackShiny: BLACK_SHINIES.includes(p[0]),
                            stage: STAGE3_IDS.includes(p[0]) ? 3 : STAGE2_IDS.includes(p[0]) ? 2 : 1,
                            sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p[0]}.png`
                        });
                    }
                });
                allPokemon.sort((a,b) => a.id - b.id);
                document.getElementById('loading-screen').style.display = 'none';
            } catch (e) { console.error(e); }
        }

        async function joinRoom() {
            const roomRef = doc(db, "pokedoku_rooms", roomName);
            const snap = await getDoc(roomRef);

            if (!snap.exists()) {
                myPlayerId = 'p1';
                generateHeaders();
                await setDoc(roomRef, {
                    headers: gridHeaders,
                    p1_grid: myGrid, p2_grid: Array(9).fill(null),
                    p1_done: false, p2_done: false,
                    p1_next: false, p2_next: false,
                    maxPhases: maxPhases, currentPhase: 1
                });
            } else {
                myPlayerId = 'p2';
                const d = snap.data();
                gridHeaders = d.headers;
                maxPhases = d.maxPhases;
                currentPhase = d.currentPhase;
            }

            onSnapshot(roomRef, (doc) => {
                const d = doc.data();
                if (!d) return;
                oppGrid = myPlayerId === 'p1' ? d.p2_grid : d.p1_grid;
                
                const oppDone = myPlayerId === 'p1' ? d.p2_done : d.p1_done;
                const myDone = myPlayerId === 'p1' ? d.p1_done : d.p2_done;

                if (oppDone && myDone) {
                    isValidated = true;
                    document.getElementById('opp-zone').style.display = 'block';
                    document.getElementById('btn-next').style.display = 'block';
                    document.getElementById('waiting-status').style.visibility = 'hidden';
                }

                // Transition phase
                if (d.p1_next && d.p2_next) {
                    currentPhase = d.currentPhase;
                    resetForNextPhase();
                }

                renderGrid('me');
                renderGrid('opp');
                document.getElementById('my-score').innerText = `${myGrid.filter(x => x).length}/9`;
                document.getElementById('opp-score').innerText = `${oppGrid.filter(x => x).length}/9`;
                updateUI();
            });
        }

        function generateHeaders() {
            const types = ['Feu', 'Eau', 'Plante', 'Électrik', 'Dragon', 'Spectre', 'Combat', 'Fée', 'Acier', 'Normal', 'Vol', 'Sol', 'Poison', 'Psy', 'Roche', 'Glace', 'Insecte', 'Ténèbres'];
            const specials = [{ type: 'legend', label: 'Légendaire' }, { type: 'starter', label: 'Starter' }, { type: 'dual', label: 'Double Type' }, { type: 'stage3', label: 'Stade 3' }];
            const pool = [...types.map(t => ({ type: 'type', value: t, label: t, sub: 'TYPE' })), ...specials.map(s => ({...s, sub: 'STATUT'}))];

            let ok = false;
            while(!ok) {
                const shuf = [...pool].sort(() => Math.random() - 0.5);
                const rows = shuf.slice(0, 3); const cols = shuf.slice(3, 6);
                let possible = true;
                for(let r of rows) { for(let c of cols) { if (!allPokemon.some(p => checkCriteria(p, r) && checkCriteria(p, c))) { possible = false; break; } } if (!possible) break; }
                if (possible) { gridHeaders = { rows, cols }; ok = true; }
            }
        }

        function checkCriteria(p, c) {
            if (c.type === 'type') return p.types.includes(c.value);
            if (c.type === 'legend') return p.isLegendary;
            if (c.type === 'starter') return p.isStarter;
            if (c.type === 'dual') return p.types.length === 2;
            if (c.type === 'stage3') return p.stage === 3;
            return false;
        }

        function renderGrid(target) {
            const container = document.getElementById(target === 'me' ? 'grid-me' : 'grid-opp');
            if (!container) return; container.innerHTML = '';
            
            const corner = document.createElement('div'); corner.className = 'header-cell'; corner.innerHTML = '🧩'; container.appendChild(corner);
            gridHeaders.cols.forEach(h => {
                const c = document.createElement('div'); c.className = 'header-cell';
                c.innerHTML = `<div class="header-label">${h.label}</div><div class="header-sub">${h.sub}</div>`;
                container.appendChild(c);
            });

            for (let r = 0; r < 3; r++) {
                const rh = gridHeaders.rows[r];
                const rhc = document.createElement('div'); rhc.className = 'header-cell';
                rhc.innerHTML = `<div class="header-label">${rh.label}</div><div class="header-sub">${rh.sub}</div>`;
                container.appendChild(rhc);

                for (let c = 0; c < 3; c++) {
                    const idx = r * 3 + c;
                    const cell = document.createElement('div'); cell.className = 'game-cell';
                    const pId = target === 'me' ? myGrid[idx] : oppGrid[idx];
                    const p = pId ? allPokemon.find(x => x.id === pId) : null;

                    if (p) {
                        const isOk = checkCriteria(p, gridHeaders.rows[r]) && checkCriteria(p, gridHeaders.cols[c]);
                        
                        // On affiche la couleur si :
                        // 1. On a cliqué sur Valider (isValidated)
                        // 2. OU si le Pokémon était déjà là au début de la phase (survivant d'une phase précédente)
                        const wasAlreadyThere = target === 'me' && gridAtPhaseStart[idx] === pId;

                        if (isValidated || wasAlreadyThere) {
                            cell.classList.add(isOk ? 'correct' : 'error');
                        }
                        
                        cell.innerHTML = `<div class="pokemon-entry"><img src="${p.sprite}"><div class="poke-name">${p.name}</div></div>`;
                    } else { cell.innerHTML = '<span style="font-size:30px; color:var(--text-dim);">+</span>'; }
                    if (!isValidated && target === 'me') cell.onclick = () => openModal(idx);
                    container.appendChild(cell);
                }
            }
        }

        window.handleValidate = async () => {
            isValidated = true;
            renderGrid('me');
            // ...
            
            if (gameMode === 'solo') {
                document.getElementById('btn-validate').style.display = 'none';
                document.getElementById('btn-next').style.display = 'block';
            } else {
                const roomRef = doc(db, "pokedoku_rooms", roomName);
                const update = {}; update[`${myPlayerId}_done`] = true;
                await updateDoc(roomRef, update);
                document.getElementById('waiting-status').style.visibility = 'visible';
                document.getElementById('btn-validate').style.display = 'none';
            }
        };

        window.handleNextPhase = async () => {
            if (gameMode === 'solo') {
                if (currentPhase < maxPhases) {
                    const allCorrect = myGrid.every((pId, i) => {
                        if (!pId) return false;
                        const p = allPokemon.find(x => x.id === pId);
                        return checkCriteria(p, gridHeaders.rows[Math.floor(i/3)]) && checkCriteria(p, gridHeaders.cols[i%3]);
                    });
                    if (allCorrect) return endGame(true);
                    
                    currentPhase++;
                    resetForNextPhase();
                } else {
                    endGame();
                }
            } else {
                const roomRef = doc(db, "pokedoku_rooms", roomName);
                const update = { currentPhase: currentPhase + 1 };
                update[`${myPlayerId}_next`] = true;
                await updateDoc(roomRef, update);
                document.getElementById('btn-next').disabled = true;
                document.getElementById('waiting-status').style.visibility = 'visible';
            }
        };

        function resetForNextPhase() {
            isValidated = false;
            myGrid = myGrid.map((pId, i) => {
                if (!pId) return null;
                const p = allPokemon.find(x => x.id === pId);
                const ok = checkCriteria(p, gridHeaders.rows[Math.floor(i/3)]) && checkCriteria(p, gridHeaders.cols[i%3]);
                return ok ? pId : null;
            });
            gridAtPhaseStart = [...myGrid];
            renderGrid('me');
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-next').disabled = false;
            document.getElementById('btn-validate').style.display = 'block';
            document.getElementById('waiting-status').style.visibility = 'hidden';
            if (gameMode === 'multi') document.getElementById('opp-zone').style.display = 'none';
            updateUI();
        }

        function endGame(victory = false) {
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-restart').style.display = 'block';
            if (victory) alert("BRAVO ! Vous avez complété la grille !");
            else {
                isValidated = true;
                renderGrid('me');
                alert("Fin des phases. Voici la correction.");
            }
        }

        function updateUI() {
            document.getElementById('phase-counter').innerText = `PHASE ${currentPhase}/${maxPhases === 999 ? '∞' : maxPhases}`;
            document.getElementById('room-status').innerText = gameMode === 'solo' ? 'SOLO' : `SALLE: ${roomName}`;
        }

        window.openModal = (idx) => {
            currentCell = idx;
            const r = gridHeaders.rows[Math.floor(idx/3)]; const c = gridHeaders.cols[idx%3];
            document.getElementById('modal-target-title').innerText = `${r.label} × ${c.label}`;
            document.getElementById('modal-overlay').classList.add('active');
            document.getElementById('search-input').value = '';
            showResults('');
            setTimeout(() => document.getElementById('search-input').focus(), 100);
        };

        window.filterPokemon = (v) => showResults(v);
        function showResults(query) {
            const container = document.getElementById('results-grid');
            const q = query.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const filtered = allPokemon.filter(p => p.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(q));
            container.innerHTML = '';
            filtered.forEach(p => {
                const card = document.createElement('div'); card.className = 'result-card';
                card.innerHTML = `<img src="${p.sprite}"><div style="font-size: 9px; color: var(--accent2);">#${p.id}</div><div class="result-name">${p.name}</div>`;
                card.onclick = () => selectPokemon(p.id); container.appendChild(card);
            });
        }

        async function selectPokemon(pId) {
            myGrid[currentCell] = pId; renderGrid('me');
            document.getElementById('modal-overlay').classList.remove('active');
            if (roomName) {
                const roomRef = doc(db, "pokedoku_rooms", roomName);
                const update = {}; update[`${myPlayerId}_grid`] = myGrid;
                await updateDoc(roomRef, update);
            }
        }

        init();
        selectMode('solo');
    </script>
</body>
</html>
